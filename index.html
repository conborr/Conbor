<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time weather radar and traffic cameras for Iowa">
    <title>Iowa Weather Radar & Traffic Cameras</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>🌦️ Iowa Weather Radar & Traffic Cameras</h1>
        <p>Real-time weather radar overlay and live traffic camera feeds</p>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Map Container -->
        <div id="map" class="map"></div>

        <!-- Side Panel for Camera Details -->
        <div id="side-panel" class="side-panel">
            <div id="side-panel-content">
                <p class="status-message info">Click on a camera marker to view details</p>
            </div>
        </div>
    </div>

    <!-- Leaflet Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet MarkerCluster Library -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <!-- Custom Application Script -->
    <script src="app.js"></script>
</body>
</html>
