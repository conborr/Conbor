<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Weather App</h1>
        <input type="text" id="search-box" placeholder="Enter city name..."></input>
        <button id="search-button">Search</button>
    </header>
    <main>
        <section id="weather-forecast">
            <h2>Weather Forecast</h2>
            <div id="forecast-panel">
                <!-- Weather data will be displayed here -->
            </div>
        </section>
        <section>
            <label for="radar-toggle">Show Radar:</label>
            <input type="checkbox" id="radar-toggle">
        </section>
    </main>
    <footer>
        <p>© 2026 Weather App</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
