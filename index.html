<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-controls">
            <input type="text" id="citySearch" placeholder="Search for a city...">
            <button id="radarToggle">Toggle Radar</button>
        </div>
    </header>
    <main>
        <div id="mapContainer">
            <!-- Map will be loaded here -->
        </div>
        <aside id="sidePanel">
            <h2>Camera Details</h2>
            <p id="cameraInfo">Details about the camera...</p>
        </aside>
    </main>
    <footer>
        <div id="weatherForecast">
            <h2>Weather Forecast</h2>
            <div id="forecastDetails">
                <!-- Weather forecast details will be populated here -->
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
